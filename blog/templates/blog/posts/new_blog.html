{% extends 'blog/basetemplates/base.html' %}
{% load bootstrap4 %}
{% block content %}
    <section id="form_create">
    <div class="container-fluid">
        <div class="col-md-8 m-auto">
            <h2 class="text-center">WRITE AN ARTICLE</h2>
             <h6 class="text-center lead">{{user.first_name}} {{user.last_name}}</h6>
        <form id="formELem"
            method="POST"
            action="{% url 'blog:newBlogPost' %}"
            enctype="multipart/form-data" 
            id="formELem" 
            class="form">

            {% csrf_token %}
            {% bootstrap_form form %}

            {% buttons %}
            <button type="submit" class="btn btn-primary">
                Submit
            </button>
            {% endbuttons %}
        </form>
            </div>
    </div>
    </section>
{% endblock content %}
