{% extends 'blog/basetemplates/base.html' %}
{% load bootstrap4 %}
{% load static %}
{% block content %}
    <section id="login-form">
    <div class="container form-card">
    <div class="card m-auto mb-5">
        <div class="row no-gutters">
            <div class="col-md-12 border-bottom mt-5 p-5">
                <div class="display-4 mb-3">Log In</div>
                <form method="post" action="{% url 'user:login' %}" class="form">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    {% buttons %}
                        <button name="submit" class="btn btn-dark">Log in</button>
                    {% endbuttons %}
                    <input type="hidden"  name="next" value="{% url 'blog:index' %}">
                </form>
                No Account ? Create an Account <a href="{% url 'user:register' %}">here</a>
            </div>
            </div>
        </div>
        </div>
    </section>

{% endblock content %}
