<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply the saved theme before first paint so dark-mode users never see
         a light flash. mentisflow:theme is 'light' | 'dark' | 'system'
         (system, the default, follows the OS); adhd_theme is the legacy
         JSON-encoded key, honoured until ThemeProvider migrates it. -->
    <script>
      try {
        var mode = localStorage.getItem('mentisflow:theme')
        if (!mode) { try { mode = JSON.parse(localStorage.getItem('adhd_theme')) } catch (e) {} }
        var dark = mode === 'dark' ||
          ((!mode || mode === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MentisFlow: Mental health care, connected</title>
    <meta name="description" content="Connect with HPCSA-registered psychiatrists and psychologists. Book appointments, share your mental health data, and manage your wellbeing with FocusBlink." />
    <meta name="theme-color" content="#F3F3F7" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- The web app manifest link is injected by vite-plugin-pwa with the
         correct base path. %BASE_URL% is substituted by Vite at build time. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MentisFlow" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />

    <!-- Fonts. Inter is the UI/body sans; Fraunces is the editorial display
         serif used for headlines (kept at weight 400, with a true italic for
         the accented greeting). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
