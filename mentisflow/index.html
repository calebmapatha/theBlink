<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply a returning user's saved theme before first paint (light by
         default) so dark-mode users never see a light flash. Value is JSON
         (see useLocalStorage). -->
    <script>
      try {
        if (JSON.parse(localStorage.getItem('adhd_theme')) === 'dark') {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MentisFlow: Mental health care, connected</title>
    <meta name="description" content="Connect with HPCSA-registered psychiatrists and psychologists. Book appointments, share your mental health data, and manage your wellbeing with FocusBlink." />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="manifest" href="/theBlink/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/theBlink/favicon.svg" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MentisFlow" />
    <link rel="apple-touch-icon" href="/theBlink/apple-touch-icon.png" />

    <!-- Fonts. Inter is the UI/body sans; Fraunces is the editorial display
         serif used for headlines (kept at weight 400, with a true italic for
         the accented greeting). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
