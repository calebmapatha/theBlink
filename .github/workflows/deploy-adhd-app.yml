name: Deploy FocusBlink to GitHub Pages

on:
  push:
    branches: [main, master, claude/adhd-support-webapp-ZvqZV]
    paths:
      - 'adhd-app/**'
      - '.github/workflows/deploy-adhd-app.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: adhd-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: adhd-app

      - name: Build
        run: npm run build
        working-directory: adhd-app
        env:
          VITE_BASE_URL: /theBlink/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: adhd-app/dist

      - uses: actions/deploy-pages@v4
        id: deployment
