name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'focusblink-android/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install
        working-directory: focusblink-android

      - name: Build web assets
        run: npm run build
        working-directory: focusblink-android
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:             ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Add Capacitor Android platform
        run: npx cap add android
        working-directory: focusblink-android

      - name: Sync web assets to Android
        run: npx cap sync android
        working-directory: focusblink-android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        working-directory: focusblink-android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FocusBlink-android-${{ github.run_number }}
          path: focusblink-android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
