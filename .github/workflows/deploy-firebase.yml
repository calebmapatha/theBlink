name: Deploy Firebase (rules / hosting)

# Manually triggered from GitHub Actions tab.
# Requires one repo secret:
#   FIREBASE_TOKEN  — generate with: firebase login:ci
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'firestore:rules'
        type: choice
        options:
          - firestore:rules
          - hosting
          - firestore:rules,hosting

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy
        run: firebase deploy --only ${{ inputs.target }} --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
